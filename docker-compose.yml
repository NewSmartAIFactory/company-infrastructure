services:
  postgres:
    image: postgres:16
    container_name: smart-ai-factory-postgres
    environment:
      POSTGRES_DB: company_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: smart-ai-factory-redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: smart-ai-factory-qdrant
    ports:
      - "6333:6333"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: smart-ai-factory-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
